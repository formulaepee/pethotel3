<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ペットホテル わんにゃんステイ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:#333;scroll-behavior:smooth}
header{background:#ffb703;color:#fff;padding:40px 20px;text-align:center;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:2.2rem}
section{padding:60px 20px;max-width:1100px;margin:auto;opacity:0;transform:translateY(30px);transition:all .6s}
section.show{opacity:1;transform:translateY(0)}
.hero-img{width:100%;max-height:420px;object-fit:cover;border-radius:20px;transition:transform .5s}
.hero-img:hover{transform:scale(1.05)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:25px;text-align:center;transition:transform .3s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:160px;object-fit:cover;border-radius:14px}
.price-table{width:100%;border-collapse:collapse;margin-top:20px}
.price-table th,.price-table td{border:1px solid #ddd;padding:12px;text-align:center}
.price-table th{background:#fef3c7}
.cta{text-align:center;padding:50px}
button{background:#ffb703;color:#fff;border:none;border-radius:30px;padding:12px 24px;cursor:pointer}
form{max-width:600px;margin:30px auto}
form input,form textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.gallery img{width:100%;border-radius:10px;cursor:pointer}
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center}
#modal img{max-width:80%;border-radius:10px}
footer{background:#1f2937;color:#fff;text-align:center;padding:20px}
</style>
</head>
<body>

<header>
  <h1>ペットホテル わんにゃんステイ</h1>
</header>

<section>
  <!-- メイン画像 -->
  <img class="hero-img" src="https://images.unsplash.com/photo-1517849845537-4d257902454a">
</section>

<section>
  <h2>特徴</h2>
  <div class="features">
    <div class="card">
      <!-- 清潔な施設画像 -->
      <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e">
      <h3>清潔</h3>
    </div>
    <div class="card">
      <!-- 散歩画像 -->
      <img src="https://images.unsplash.com/photo-1558944351-cdcb7eab2e63">
      <h3>運動</h3>
    </div>
    <div class="card">
      <!-- 猫画像 -->
      <img src="https://images.unsplash.com/photo-1596495578065-6e0763fa1178">
      <h3>猫専用</h3>
    </div>
  </div>
</section>

<section>
  <h2>ギャラリー（クリックで拡大）</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d" onclick="openModal(this.src)">
    <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b" onclick="openModal(this.src)">
    <img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8" onclick="openModal(this.src)">
  </div>
</section>

<section>
  <h2>予約</h2>
  <form onsubmit="submitForm(event)">
    <input id="name" placeholder="名前" required>
    <input id="email" placeholder="メール" required>
    <button>送信</button>
  </form>
</section>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<footer>
  <p>© 2026</p>
</footer>

<script>
// スクロールでフェードイン
const sections = document.querySelectorAll('section');
window.addEventListener('scroll',()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('show');
    }
  })
});

// モーダル画像
function openModal(src){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalImg').src=src;
}
function closeModal(){
  document.getElementById('modal').style.display='none';
}

// フォーム処理
function submitForm(e){
  e.preventDefault();
  const name=document.getElementById('name').value;
  if(name.length<2){alert('名前短すぎ');return;}
  alert('送信完了（デモ）');
}
</script>

</body>
</html>
